<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MY OSSETIA TRAVEL</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    window.addEventListener('error', function (event) {
      document.body.innerHTML += '<div style="position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(255,0,0,0.9); color:white; padding:2rem; font-family:monospace; overflow:auto;"><h2>Runtime Error (index.html)</h2><p>' + event.message + '</p><pre>' + event.error?.stack + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(200,0,0,0.9); color:white; padding:2rem; font-family:monospace; overflow:auto;"><h2>Unhandled Promise Rejection</h2><p>' + event.reason + '</p></div>';
    });
  </script>
</body>

</html>
